<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-FIT PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Barlow Condensed', sans-serif; }
.timer-ring { transform: rotate(-90deg); }
</style>
</head>

<body class="bg-black text-white p-4">

<h1 class="text-3xl text-orange-500 font-bold">T-FIT PRO</h1>

<!-- PESO -->
<div class="bg-gray-900 p-3 rounded mt-3">
<input id="weightInput" type="number" placeholder="Peso (kg)" class="w-full p-2 bg-black rounded">
<button onclick="saveWeight()" class="bg-purple-600 w-full mt-2 p-2 rounded">Salva</button>
<canvas id="weightChart" height="100"></canvas>
</div>

<!-- CALENDARIO -->
<div id="calendar" class="grid grid-cols-7 gap-2 mt-4"></div>

<!-- WORKOUT -->
<h2 class="text-xl text-purple-400 mt-4">Workout</h2>
<div id="workoutList"></div>

<!-- LIBRERIA -->
<select id="exerciseSelect" class="w-full p-2 bg-gray-800 rounded mt-3"></select>
<button onclick="addExercise()" class="bg-orange-500 w-full mt-2 p-2 rounded">Aggiungi</button>

<!-- TIMER -->
<div id="timerOverlay" class="fixed inset-0 bg-black flex flex-col items-center justify-center hidden">
<svg width="200" height="200" class="timer-ring">
<circle cx="100" cy="100" r="90" stroke="gray" stroke-width="10" fill="none"/>
<circle id="progress" cx="100" cy="100" r="90" stroke="#FF6B00" stroke-width="10" fill="none"
stroke-dasharray="565" stroke-dashoffset="0"/>
</svg>
<div id="timeText" class="text-5xl mt-4">30</div>
<button onclick="addTime()" class="bg-purple-600 mt-4 p-3 rounded">+10s</button>
</div>

<script>

// ===== DB (ridotta qui per spazio, puoi espandere) =====
const EXERCISES_DB = Array.from({length:30},(_,i)=>({
id:i+1,
name:"Exercise "+(i+1),
category:"Full",
muscles:"various",
isTimeBased:i%2===0,
desc:"desc",
gifUrl:"https://via.placeholder.com/100"
}));

// ===== STATE =====
let currentDate = new Date().toISOString().slice(0,10);
let workouts = JSON.parse(localStorage.getItem("workouts")||"{}");
let weights = JSON.parse(localStorage.getItem("weights")||"[]");

// ===== UI =====
function populateExercises(){
let s=document.getElementById("exerciseSelect");
EXERCISES_DB.forEach(e=>{
let o=document.createElement("option");
o.value=e.id;o.textContent=e.name;
s.appendChild(o);
});
}

function getWorkout(){
return workouts[currentDate]||[];
}

function saveWorkout(w){
workouts[currentDate]=w;
localStorage.setItem("workouts",JSON.stringify(workouts));
generateCalendar();
}

function addExercise(){
let id=parseInt(exerciseSelect.value);
let w=getWorkout();
w.push({id,done:false});
saveWorkout(w);
renderWorkout();
}

function renderWorkout(){
let list=document.getElementById("workoutList");
list.innerHTML="";
let w=getWorkout();

w.forEach((ex,i)=>{
let data=EXERCISES_DB.find(e=>e.id===ex.id);

let div=document.createElement("div");
div.className="flex justify-between bg-gray-900 p-2 mt-2 rounded";

div.innerHTML=`
<span class="${ex.done?'line-through opacity-40':''}">
${i+1}. ${data.name}
</span>

<div class="space-x-2">
<button onclick="move(${i},-1)">↑</button>
<button onclick="move(${i},1)">↓</button>
<button onclick="toggle(${i})">✔</button>
</div>
`;

list.appendChild(div);
});
}

function toggle(i){
let w=getWorkout();
w[i].done=!w[i].done;
saveWorkout(w);
renderWorkout();
startTimer();
}

function move(i,dir){
let w=getWorkout();
let j=i+dir;
if(j<0||j>=w.length)return;
[w[i],w[j]]=[w[j],w[i]];
saveWorkout(w);
renderWorkout();
}

// ===== TIMER =====
let time=30,interval,wakeLock;

async function startTimer(){
document.getElementById("timerOverlay").classList.remove("hidden");
time=30;

if('wakeLock' in navigator){
wakeLock=await navigator.wakeLock.request('screen');
}

interval=setInterval(()=>{
time--;
timeText.innerText=time;

let offset=565-(565*time/30);
progress.style.strokeDashoffset=offset;

if(time<=0){
clearInterval(interval);
navigator.vibrate(500);
beep();
timerOverlay.classList.add("hidden");
if(wakeLock) wakeLock.release();
}
},1000);
}

function addTime(){ time+=10; }

function beep(){
let ctx=new AudioContext();
let osc=ctx.createOscillator();
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.2);
}

// ===== CALENDAR =====
function generateCalendar(){
let cal=document.getElementById("calendar");
cal.innerHTML="";
let now=new Date();
let days=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

for(let i=1;i<=days;i++){
let dateStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

let div=document.createElement("div");
div.className="p-2 bg-gray-800 rounded text-center";

if(workouts[dateStr]) div.innerHTML=`${i}<div class="w-2 h-2 bg-orange-500 rounded-full mx-auto mt-1"></div>`;
else div.innerHTML=i;

div.onclick=()=>{
currentDate=dateStr;
renderWorkout();
};

cal.appendChild(div);
}
}

// ===== PESO =====
function saveWeight(){
let val=parseFloat(weightInput.value);
weights.push({date:Date.now(),value:val});
localStorage.setItem("weights",JSON.stringify(weights));
drawChart();
}

function drawChart(){
let c=document.getElementById("weightChart");
let ctx=c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);

if(weights.length<2)return;

let max=Math.max(...weights.map(w=>w.value));
let min=Math.min(...weights.map(w=>w.value));

weights.forEach((w,i)=>{
let x=i*(c.width/weights.length);
let y=c.height-( (w.value-min)/(max-min)*c.height );
ctx.lineTo(x,y);
});

ctx.stroke();
}

// ===== INIT =====
populateExercises();
renderWorkout();
generateCalendar();
drawChart();

// ===== SERVICE WORKER =====
if('serviceWorker' in navigator){
navigator.serviceWorker.register(URL.createObjectURL(new Blob([`
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('fetch',e=>{});
`],{type:'text/javascript'})));
}

</script>

</body>
</html>
