<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>T-FIT ELITE PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=Inter:wght@400;700&display=swap');
        :root { --accent: #FF6B00; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        
        /* --- STAGE ANIMAZIONE PROFESSIONALE --- */
        .stage { width: 100%; height: 320px; background: radial-gradient(circle, #222 0%, #000 100%); display: flex; align-items: center; justify-content: center; border-bottom: 3px solid var(--accent); position: relative; }
        
        .human-body { fill: var(--accent); filter: drop-shadow(0 0 15px rgba(255,107,0,0.4)); }
        
        /* Movimenti Biomeccanici */
        @keyframes exercise-move {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(45px) scaleY(0.85); }
        }
        .animate-body { animation: exercise-move 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite; }
        
        /* UI */
        .content { padding: 25px; }
        h1 { font-family: 'Barlow Condensed'; font-size: 35px; text-transform: uppercase; margin: 0; }
        .ex-title { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .ex-cat { color: var(--accent); text-transform: uppercase; font-size: 14px; letter-spacing: 2px; font-weight: 700; }
        .set-card { background: var(--card); padding: 15px; border-radius: 12px; margin-top: 15px; display: flex; justify-content: space-between; border-left: 4px solid var(--accent); }
        .btn { background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: 800; text-transform: uppercase; margin-top: 25px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="stage" id="main-stage">
            <svg viewBox="0 0 200 200" width="220" height="220">
                <g class="animate-body">
                    <circle class="human-body" cx="100" cy="40" r="15"/>
                    <path class="human-body" d="M85,60 L115,60 L120,120 L80,120 Z"/>
                    <rect class="human-body" x="65" y="60" width="15" height="50" rx="7"/>
                    <rect class="human-body" x="120" y="60" width="15" height="50" rx="7"/>
                    <rect class="human-body" x="80" y="125" width="18" height="60" rx="9"/>
                    <rect class="human-body" x="102" y="125" width="18" height="60" rx="9"/>
                </g>
                <rect x="20" y="190" width="160" height="4" fill="#333"/>
            </svg>
        </div>
        <div class="content">
            <div class="ex-cat" id="cat">Petto</div>
            <div class="ex-title" id="title">Push Up Elite</div>
            <div class="set-card"><span>Serie 1</span><strong>12 Ripetizioni</strong></div>
            <button class="btn" onclick="next()">Prossimo Esercizio</button>
        </div>
    </div>

    <script>
        const exercises = [
            { n: "Push Up", c: "Petto" },
            { n: "Squat", c: "Gambe" },
            { n: "Military Press", c: "Spalle" },
            { n: "Trazioni", c: "Dorso" }
            // Qui aggiungeremo tutti i 40 non appena confermi lo stile
        ];
        let i = 0;
        function next() {
            i = (i + 1) % exercises.length;
            document.getElementById('title').innerText = exercises[i].n;
            document.getElementById('cat').innerText = exercises[i].c;
        }
    </script>
</body>
</html>
