<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>T-FIT ELITE PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;700&display=swap');

        :root {
            --accent: #FF6B00;
            --bg: #000;
            --surface: #121212;
            --text: #fff;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* --- LAYOUT --- */
        #app { height: 100%; display: flex; flex-direction: column; }
        .screen { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .active { display: flex; }

        /* --- HEADER --- */
        .header { padding: 20px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .header h1 { font-family: 'Barlow Condensed'; font-size: 32px; font-weight: 900; text-transform: uppercase; }
        .header span { color: var(--accent); }

        /* --- ANIMAZIONE INCORPORATA (NON SERVONO FILE) --- */
        .anim-box {
            width: 100%;
            height: 200px;
            background: #0a0a0a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #222;
            margin-bottom: 20px;
        }
        .dot { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; box-shadow: 0 0 20px var(--accent); }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } }

        /* --- CALENDARIO STORICO --- */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; background: var(--surface); padding: 15px; border-radius: 20px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 8px; background: #1a1a1a; }
        .day.today { border: 2px solid var(--accent); color: var(--accent); font-weight: bold; }
        .day.completed { background: var(--accent); color: #000; }

        /* --- UI ELEMENTS --- */
        .card { background: var(--surface); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 800; text-transform: uppercase; width: 100%; cursor: pointer; }
        .btn-outline { background: #222; color: #fff; margin-top: 10px; }

        /* --- NAVIGATION --- */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid #222; }
        .nav-item { color: var(--text-dim); text-decoration: none; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

<div id="app">
    <section id="dash" class="screen active">
        <div class="header"><h1>T-FIT <span>ELITE</span></h1></div>
        <div class="card">
            <h3>Allenamento Odierno</h3>
            <p style="color:var(--text-dim); font-size:14px; margin: 10px 0 20px;">Full Body - Sessione A</p>
            <button class="btn" onclick="showScreen('player')">Inizia Ora</button>
        </div>
        <div class="header"><h1>IL TUO <span>STORICO</span></h1></div>
        <div class="calendar" id="calendar-grid"></div>
    </section>

    <section id="player" class="screen">
        <div class="anim-box">
            <div class="dot"></div> </div>
        <h2 id="ex-title" style="font-family:'Barlow Condensed'; font-size:32px;">PUSH UP</h2>
        <p id="ex-cat" style="color:var(--accent); font-weight:700; margin-bottom:20px;">PETTO</p>
        
        <div class="card">
            <div style="display:flex; justify-content:space-between;">
                <span>Serie 1/4</span>
                <strong>12 Reps</strong>
            </div>
        </div>

        <div style="margin-top:auto;">
            <button class="btn" onclick="nextEx()">Prossimo Esercizio</button>
            <button class="btn btn-outline" onclick="showScreen('dash')">Termina Sessione</button>
        </div>
    </section>

    <nav>
        <a href="#" class="nav-item active" onclick="showScreen('dash')">Home</a>
        <a href="#" class="nav-item" onclick="showScreen('player')">Workout</a>
        <a href="#" class="nav-item">Profilo</a>
    </nav>
</div>

<script>
    const exercises = [
        { n: "PUSH UP", c: "PETTO" },
        { n: "SQUAT", c: "GAMBE" },
        { n: "TRAZIONI", c: "DORSO" },
        { n: "PLANK", c: "CORE" }
    ];
    let currentIdx = 0;

    // Funzione Cambio Schermata
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(id === 'dash') document.querySelectorAll('.nav-item')[0].classList.add('active');
        if(id === 'player') document.querySelectorAll('.nav-item')[1].classList.add('active');
    }

    // Funzione Allenamento
    function nextEx() {
        currentIdx++;
        if(currentIdx >= exercises.length) {
            alert("Allenamento Completato! Salvataggio nello storico...");
            currentIdx = 0;
            showScreen('dash');
            markDateAsCompleted();
        } else {
            document.getElementById('ex-title').innerText = exercises[currentIdx].n;
            document.getElementById('ex-cat').innerText = exercises[currentIdx].c;
        }
    }

    // Generazione Calendario Reale
    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const now = new Date();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        
        grid.innerHTML = '';
        for(let i = 1; i <= daysInMonth; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day';
            dayDiv.innerText = i;
            if(i === now.getDate()) dayDiv.className += ' today';
            grid.appendChild(dayDiv);
        }
    }

    function markDateAsCompleted() {
        const today = new Date().getDate();
        const days = document.querySelectorAll('.day');
        days[today - 1].classList.add('completed');
    }

    // Inizializzazione
    renderCalendar();
</script>
</body>
</html>
