<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-FIT</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Barlow Condensed', sans-serif; }
.timer-ring {
  transform: rotate(-90deg);
}
</style>
</head>

<body class="bg-black text-white">

<div class="p-4 space-y-4">

<h1 class="text-3xl font-bold text-orange-500">T-FIT</h1>

<!-- Peso -->
<div class="bg-gray-900 p-3 rounded-xl">
<label>Peso attuale (kg)</label>
<input id="weightInput" type="number" class="w-full p-2 bg-black rounded mt-2">
</div>

<!-- Calendario -->
<div id="calendar" class="grid grid-cols-7 gap-2"></div>

<!-- Workout -->
<div>
<h2 class="text-xl text-purple-400">Workout Oggi</h2>
<div id="workoutList"></div>
</div>

<!-- Libreria -->
<div>
<h2 class="text-xl text-orange-500">Aggiungi Esercizio</h2>
<select id="exerciseSelect" class="w-full p-2 bg-gray-800 rounded"></select>
<button onclick="addExercise()" class="bg-orange-500 w-full mt-2 p-2 rounded">Aggiungi</button>
</div>

</div>

<!-- TIMER -->
<div id="timerOverlay" class="fixed inset-0 bg-black flex flex-col items-center justify-center hidden">
<svg width="200" height="200" class="timer-ring">
<circle cx="100" cy="100" r="90" stroke="gray" stroke-width="10" fill="none"/>
<circle id="progress" cx="100" cy="100" r="90" stroke="#FF6B00" stroke-width="10" fill="none"
stroke-dasharray="565" stroke-dashoffset="0"/>
</svg>

<div id="timeText" class="text-4xl mt-4">30</div>

<button onclick="addTime()" class="bg-purple-600 mt-4 p-3 rounded">+10s</button>
</div>

<script>

// ================= DATABASE =================
const EXERCISES_DB = [
{ id:1,name:"Push-Up",category:"Petto",muscles:"petto,tricipiti",isTimeBased:false,desc:"Flessioni classiche",gifUrl:"https://via.placeholder.com/100"},
{ id:2,name:"Diamond Push-Up",category:"Petto",muscles:"petto interno",isTimeBased:false,desc:"Mani strette",gifUrl:"https://via.placeholder.com/100"},
{ id:3,name:"Incline Push-Up",category:"Petto",muscles:"petto alto",isTimeBased:false,desc:"Su rialzo",gifUrl:"https://via.placeholder.com/100"},

{ id:4,name:"Squat",category:"Gambe",muscles:"quadricipiti",isTimeBased:false,desc:"Squat base",gifUrl:"https://via.placeholder.com/100"},
{ id:5,name:"Jump Squat",category:"Gambe",muscles:"gambe",isTimeBased:false,desc:"Squat esplosivo",gifUrl:"https://via.placeholder.com/100"},
{ id:6,name:"Lunges",category:"Gambe",muscles:"glutei",isTimeBased:false,desc:"Affondi",gifUrl:"https://via.placeholder.com/100"},

{ id:7,name:"Plank",category:"Core",muscles:"addome",isTimeBased:true,desc:"Isometrico",gifUrl:"https://via.placeholder.com/100"},
{ id:8,name:"Side Plank",category:"Core",muscles:"obliqui",isTimeBased:true,desc:"Laterale",gifUrl:"https://via.placeholder.com/100"},
{ id:9,name:"Crunch",category:"Core",muscles:"addome",isTimeBased:false,desc:"Crunch base",gifUrl:"https://via.placeholder.com/100"},

{ id:10,name:"Superman",category:"Schiena",muscles:"lombari",isTimeBased:true,desc:"Estensione",gifUrl:"https://via.placeholder.com/100"},
{ id:11,name:"Reverse Snow Angel",category:"Schiena",muscles:"schiena",isTimeBased:true,desc:"Movimento lento",gifUrl:"https://via.placeholder.com/100"},

{ id:12,name:"Burpees",category:"Cardio",muscles:"fullbody",isTimeBased:false,desc:"Completo",gifUrl:"https://via.placeholder.com/100"},
{ id:13,name:"Mountain Climbers",category:"Cardio",muscles:"core",isTimeBased:true,desc:"Veloce",gifUrl:"https://via.placeholder.com/100"},
{ id:14,name:"High Knees",category:"Cardio",muscles:"cardio",isTimeBased:true,desc:"Ginocchia alte",gifUrl:"https://via.placeholder.com/100"},

// aggiunti fino a 30+
{ id:15,name:"Wall Sit",category:"Gambe",muscles:"quadricipiti",isTimeBased:true,desc:"Isometrico",gifUrl:"https://via.placeholder.com/100"},
{ id:16,name:"Glute Bridge",category:"Gambe",muscles:"glutei",isTimeBased:false,desc:"Ponte",gifUrl:"https://via.placeholder.com/100"},
{ id:17,name:"Russian Twist",category:"Core",muscles:"obliqui",isTimeBased:false,desc:"Rotazioni",gifUrl:"https://via.placeholder.com/100"},
{ id:18,name:"Leg Raise",category:"Core",muscles:"addome",isTimeBased:false,desc:"Sollevamento gambe",gifUrl:"https://via.placeholder.com/100"},
{ id:19,name:"Flutter Kicks",category:"Core",muscles:"addome",isTimeBased:true,desc:"Veloci",gifUrl:"https://via.placeholder.com/100"},
{ id:20,name:"Pike Push-Up",category:"Petto",muscles:"spalle",isTimeBased:false,desc:"Push-up avanzato",gifUrl:"https://via.placeholder.com/100"},
{ id:21,name:"Step-Up",category:"Gambe",muscles:"quadricipiti",isTimeBased:false,desc:"Su box",gifUrl:"https://via.placeholder.com/100"},
{ id:22,name:"Box Jump",category:"Cardio",muscles:"gambe",isTimeBased:false,desc:"Salto",gifUrl:"https://via.placeholder.com/100"},
{ id:23,name:"Skater Jump",category:"Cardio",muscles:"gambe",isTimeBased:true,desc:"Laterale",gifUrl:"https://via.placeholder.com/100"},
{ id:24,name:"Bear Crawl",category:"Core",muscles:"core",isTimeBased:true,desc:"Camminata",gifUrl:"https://via.placeholder.com/100"},
{ id:25,name:"Donkey Kick",category:"Gambe",muscles:"glutei",isTimeBased:false,desc:"Kick",gifUrl:"https://via.placeholder.com/100"},
{ id:26,name:"Fire Hydrant",category:"Gambe",muscles:"glutei",isTimeBased:false,desc:"Laterale",gifUrl:"https://via.placeholder.com/100"},
{ id:27,name:"Tuck Jump",category:"Cardio",muscles:"gambe",isTimeBased:false,desc:"Salto alto",gifUrl:"https://via.placeholder.com/100"},
{ id:28,name:"Jump Rope",category:"Cardio",muscles:"cardio",isTimeBased:true,desc:"Corda",gifUrl:"https://via.placeholder.com/100"},
{ id:29,name:"Hollow Hold",category:"Core",muscles:"addome",isTimeBased:true,desc:"Isometrico",gifUrl:"https://via.placeholder.com/100"},
{ id:30,name:"Handstand Hold",category:"Schiena",muscles:"spalle",isTimeBased:true,desc:"Verticale",gifUrl:"https://via.placeholder.com/100"}
];

// ================= STORAGE =================
let workout = JSON.parse(localStorage.getItem("workout")||"[]");

// ================= UI =================
function populateExercises(){
let select=document.getElementById("exerciseSelect");
EXERCISES_DB.forEach(e=>{
let opt=document.createElement("option");
opt.value=e.id;
opt.textContent=e.name;
select.appendChild(opt);
});
}

function addExercise(){
let id=parseInt(document.getElementById("exerciseSelect").value);
workout.push({id,done:false});
save();
renderWorkout();
}

function renderWorkout(){
let container=document.getElementById("workoutList");
container.innerHTML="";

workout.forEach((w,i)=>{
let ex=EXERCISES_DB.find(e=>e.id===w.id);

let div=document.createElement("div");
div.className="flex justify-between bg-gray-900 p-2 mt-2 rounded";

div.innerHTML=`
<span class="${w.done?'line-through opacity-40':''}">${i+1}. ${ex.name}</span>
<div>
<button onclick="toggleDone(${i})">✔</button>
</div>
`;

container.appendChild(div);
});
}

function toggleDone(i){
workout[i].done=!workout[i].done;
save();
renderWorkout();
startTimer();
}

function save(){
localStorage.setItem("workout",JSON.stringify(workout));
}

// ================= TIMER =================
let time=30;
let interval;

function startTimer(){
document.getElementById("timerOverlay").classList.remove("hidden");
time=30;

interval=setInterval(()=>{
time--;
document.getElementById("timeText").innerText=time;

let offset=565-(565*time/30);
document.getElementById("progress").style.strokeDashoffset=offset;

if(time<=0){
clearInterval(interval);
navigator.vibrate(500);
beep();
document.getElementById("timerOverlay").classList.add("hidden");
}
},1000);
}

function addTime(){
time+=10;
}

function beep(){
let ctx=new AudioContext();
let osc=ctx.createOscillator();
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.2);
}

// ================= CALENDAR =================
function generateCalendar(){
let cal=document.getElementById("calendar");
let now=new Date();
let days=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

for(let i=1;i<=days;i++){
let div=document.createElement("div");
div.className="bg-gray-800 p-2 text-center rounded";

div.innerHTML=i;
cal.appendChild(div);
}
}

// ================= INIT =================
populateExercises();
renderWorkout();
generateCalendar();

</script>

</body>
</html>
