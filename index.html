<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Fit Pro Coach</title>
    <style>
        :root { --bg: #1a1a1a; --orange: #ff6600; --purple: #8a2be2; --gray: #2d2d2d; --text: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Layout */
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--purple); background: #000; }
        h1 { color: var(--orange); margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .container { padding: 15px; max-width: 600px; margin: auto; }

        /* Progress Bar */
        #progress-wrap { position: fixed; top: 0; width: 100%; height: 4px; background: #000; z-index: 9999; }
        #progress-fill { height: 100%; width: 0%; background: var(--purple); transition: 0.3s; box-shadow: 0 0 10px var(--purple); }

        /* Calendario */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: var(--gray); padding: 10px; border-radius: 10px; }
        .day { padding: 10px 0; text-align: center; border-radius: 5px; cursor: pointer; font-size: 0.9rem; position: relative; }
        .day.today { border: 1px solid var(--orange); }
        .day.selected { background: var(--purple) !important; }
        .day.has-event::after { content: ''; width: 4px; height: 4px; background: var(--orange); border-radius: 50%; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); }

        /* Esercizi */
        .card { background: var(--gray); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--orange); position: relative; transition: 0.2s; }
        .card.done { opacity: 0.4; border-left-color: var(--purple); }
        .card h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .card p { margin: 0; font-size: 0.85rem; color: #bbb; }
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        
        /* Bottoni */
        button { border: none; border-radius: 6px; padding: 10px 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-orange { background: var(--orange); color: #fff; }
        .btn-purple { background: var(--purple); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid #555; color: #fff; width: 100%; margin-top: 10px; }
        
        /* Pannello Creazione */
        #editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: 1px solid #444; color: #fff; border-radius: 8px; }

        /* Timer Overlay */
        #timer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #timer-num { font-size: 8rem; color: var(--purple); font-weight: bold; }
        
        /* Animazioni */
        .gif-container { width: 100%; display: none; margin-top: 10px; border-radius: 8px; overflow: hidden; background: #000; }
        .gif-container img { width: 100%; display: block; }
    </style>
</head>
<body>

<div id="progress-wrap"><div id="progress-fill"></div></div>

<header><h1>T-FIT COACH</h1></header>

<div class="container">
    <div class="cal-header">
        <h2 id="currentMonth">Mese</h2>
        <button class="btn-purple" onclick="openEditor()">+ NUOVA SCHEDA</button>
    </div>
    <div id="calendar" class="calendar-grid"></div>

    <div id="daily-workout" style="margin-top: 25px;">
        <h3 id="selected-date-label">Seleziona un giorno</h3>
        <div id="exercise-list"></div>
    </div>
</div>

<div id="editor-overlay">
    <h2>Crea Allenamento</h2>
    <div id="editor-items"></div>
    <button class="btn-orange" onclick="addExerciseField()">+ AGGIUNGI ESERCIZIO</button>
    <div style="margin-top: 30px; display: flex; gap: 10px;">
        <button class="btn-purple" style="flex:1" onclick="saveWorkout()">SALVA SCHEDA</button>
        <button class="btn-outline" style="flex:1" onclick="closeEditor()">ANNULLA</button>
    </div>
</div>

<div id="timer-overlay">
    <h2 id="timer-task" style="color: var(--orange)">RECUPERO</h2>
    <div id="timer-num">30</div>
    <button class="btn-orange" onclick="adjustTimer(10)" style="font-size: 1.2rem;">+ 10 SEC</button>
</div>

<script>
// LIBRERIA COMPLETA ESERCIZI
const library = [
    { n: "Push-ups", d: "Piegamenti braccia standard.", g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6M2Z6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmRjPTEmZ3c9MTI4MA/3o7TKu6WJxtZvbqKv6/giphy.gif" },
    { n: "Diamond Push-ups", d: "Mani a diamante per tricipiti.", g: "https://media.giphy.com/media/26u4b4pX7pGqM6k7u/giphy.gif" },
    { n: "Squat", d: "Gambe larghezza spalle, scendi col bacino.", g: "https://media.giphy.com/media/26u49w47AfX7hZ0n6/giphy.gif" },
    { n: "Plank", d: "Tenuta addominale sugli avambracci.", g: "https://media.giphy.com/media/3o7TKu6WJxtZvbqKv6/giphy.gif" },
    { n: "Affondi", d: "Passo avanti e scendi col ginocchio.", g: "https://media.giphy.com/media/l41lS2fO7H2nRXOxi/giphy.gif" },
    { n: "Burpees", d: "Piegamento, salto e battito mani.", g: "https://media.giphy.com/media/26u4b4pX7pGqM6k7u/giphy.gif" },
    { n: "Mountain Climbers", d: "Ginocchia al petto velocemente.", g: "https://media.giphy.com/media/3o7TKu6WJxtZvbqKv6/giphy.gif" }
];

let selectedDate = new Date().toDateString();
let workouts = JSON.parse(localStorage.getItem('tfit_workouts')) || {};
let timerInterval;
let timeLeft = 0;

// INIZIALIZZAZIONE
function init() {
    renderCalendar();
    renderWorkout();
    if ('wakeLock' in navigator) navigator.wakeLock.request('screen');
}

function renderCalendar() {
    const cal = document.getElementById('calendar');
    const now = new Date();
    document.getElementById('currentMonth').innerText = now.toLocaleString('it-IT', { month: 'long', year: 'numeric' });
    cal.innerHTML = '';
    
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    for (let i = 1; i <= daysInMonth; i++) {
        const d = new Date(now.getFullYear(), now.getMonth(), i).toDateString();
        const div = document.createElement('div');
        div.className = `day ${d === selectedDate ? 'selected' : ''} ${workouts[d] ? 'has-event' : ''}`;
        div.innerText = i;
        div.onclick = () => { selectedDate = d; renderCalendar(); renderWorkout(); };
        cal.appendChild(div);
    }
}

function renderWorkout() {
    const list = document.getElementById('exercise-list');
    const label = document.getElementById('selected-date-label');
    label.innerText = new Date(selectedDate).toLocaleDateString('it-IT', { day: 'numeric', month: 'long' });
    list.innerHTML = '';
    
    const data = workouts[selectedDate];
    if (!data) { list.innerHTML = '<p>Nessun allenamento. Clicca "+" per creare.</p>'; updateProgress(0); return; }

    data.forEach((ex, idx) => {
        const card = document.createElement('div');
        card.className = `card ${ex.done ? 'done' : ''}`;
        card.innerHTML = `
            <h3>${idx + 1}. ${ex.name}</h3>
            <p>${ex.val}</p>
            <div id="gif-${idx}" class="gif-container"><img src="${ex.gif}"></div>
            <div class="controls">
                <button class="btn-purple" onclick="toggleGif(${idx})">INFO</button>
                <button class="btn-orange" onclick="doAction(${idx})">${ex.isTime ? 'AVVIA' : 'FATTO'}</button>
            </div>
        `;
        list.appendChild(card);
    });
    updateProgress();
}

function openEditor() { document.getElementById('editor-overlay').style.display = 'block'; }
function closeEditor() { document.getElementById('editor-overlay').style.display = 'none'; }

function addExerciseField() {
    const container = document.getElementById('editor-items');
    const div = document.createElement('div');
    div.style.background = "#222"; div.style.padding = "10px"; div.style.marginBottom = "10px"; div.style.borderRadius = "8px";
    div.innerHTML = `
        <select class="ex-select">${library.map(e => `<option value="${e.n}">${e.n}</option>`).join('')}</select>
        <input type="text" class="ex-val" placeholder="es: 3 serie x 12 reps o 45 sec">
        <label style="font-size:0.8rem"><input type="checkbox" class="ex-istime"> È un esercizio a tempo?</label>
    `;
    container.appendChild(div);
}

function saveWorkout() {
    const items = document.querySelectorAll('#editor-items > div');
    let temp = [];
    items.forEach(it => {
        const name = it.querySelector('.ex-select').value;
        const libItem = library.find(l => l.n === name);
        temp.push({
            name: name,
            val: it.querySelector('.ex-val').value,
            isTime: it.querySelector('.ex-istime').checked,
            gif: libItem.g,
            done: false
        });
    });
    workouts[selectedDate] = temp;
    localStorage.setItem('tfit_workouts', JSON.stringify(workouts));
    closeEditor(); renderCalendar(); renderWorkout();
}

function doAction(idx) {
    const ex = workouts[selectedDate][idx];
    if (ex.isTime && !ex.done) {
        const sec = parseInt(ex.val) || 30;
        runTimer(sec, ex.name, () => { finishEx(idx); });
    } else { finishEx(idx); }
}

function finishEx(idx) {
    workouts[selectedDate][idx].done = true;
    localStorage.setItem('tfit_workouts', JSON.stringify(workouts));
    renderWorkout();
    setTimeout(() => runTimer(30, "RECUPERO"), 300);
}

function runTimer(sec, label, cb) {
    const ov = document.getElementById('timer-overlay');
    const display = document.getElementById('timer-num');
    document.getElementById('timer-task').innerText = label;
    ov.style.display = 'flex';
    timeLeft = sec;
    display.innerText = timeLeft;
    
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        display.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            ov.style.display = 'none';
            beep();
            if(cb) cb();
        }
    }, 1000);
}

function adjustTimer(v) { timeLeft += v; document.getElementById('timer-num').innerText = timeLeft; }

function toggleGif(idx) {
    const g = document.getElementById(`gif-${idx}`);
    g.style.display = g.style.display === 'block' ? 'none' : 'block';
}

function updateProgress() {
    const data = workouts[selectedDate] || [];
    const done = data.filter(e => e.done).length;
    const perc = data.length ? (done / data.length) * 100 : 0;
    document.getElementById('progress-fill').style.width = perc + '%';
}

function beep() {
    const a = new (window.AudioContext || window.webkitAudioContext)();
    const o = a.createOscillator(); o.connect(a.destination);
    o.start(); o.stop(a.currentTime + 0.4);
    if (navigator.vibrate) navigator.vibrate(500);
}

init();
</script>
</body>
</html>
