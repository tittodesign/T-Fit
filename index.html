<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-Pro Bodyweight App</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --orange: #ff6600;
            --purple: #8a2be2;
            --gray: #333;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Progress Bar */
        #progress-container {
            width: 100%;
            height: 5px;
            background: #000;
            position: fixed;
            top: 0;
            z-index: 1000;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--purple);
            transition: width 0.3s;
        }

        header {
            padding: 20px;
            text-align: center;
            color: var(--orange);
        }

        /* Calendar */
        #calendar-container {
            background: var(--gray);
            padding: 15px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        .day {
            padding: 10px 0;
            cursor: pointer;
            border-radius: 5px;
            position: relative;
        }
        .day:hover { background: var(--purple); }
        .has-workout::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--orange);
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Exercise List */
        .workout-list { width: 90%; max-width: 500px; }
        .exercise-card {
            background: var(--gray);
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }
        .exercise-card.completed { opacity: 0.4; text-decoration: line-through; border-left: 5px solid var(--purple); }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .anim-box { width: 100%; height: 200px; background: #000; margin-top: 10px; border-radius: 5px; overflow: hidden; display: none; }
        .anim-box img { width: 100%; height: 100%; object-fit: contain; }
        
        /* Buttons */
        button {
            background: var(--orange);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .info-btn { background: var(--purple); margin-right: 5px; }

        /* Overlay Timer */
        #timer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        #timer-display { font-size: 8rem; color: var(--purple); margin-bottom: 20px; }
        #timer-label { font-size: 1.5rem; color: var(--orange); margin-bottom: 40px; }

    </style>
</head>
<body>

<div id="progress-container"><div id="progress-bar"></div></div>

<header>
    <h1>BODYWEIGHT COACH</h1>
</header>

<div id="calendar-container">
    <h3 id="month-name">Aprile 2024</h3>
    <div class="calendar-grid" id="calendar"></div>
</div>

<div class="workout-list" id="workout-area">
    </div>

<div id="timer-overlay">
    <div id="timer-label">RECUPERO</div>
    <div id="timer-display">00</div>
    <button onclick="addTime()" style="font-size: 1.5rem; padding: 20px 40px;">+10 SECONDI</button>
</div>

<script>
    // Database Esercizi con placeholder GIF
    const exerciseDB = [
        { id: 1, name: "Push-Ups", type: "reps", desc: "Mantieni il core contratto, scendi col petto quasi a terra.", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6M2Z6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmRjPTEmZ3c9MTI4MA/3o7TKu6WJxtZvbqKv6/giphy.gif" },
        { id: 2, name: "Squats", type: "reps", desc: "Peso sui talloni, schiena dritta, scendi oltre i 90 gradi.", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6M2Z6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmRjPTEmZ3c9MTI4MA/26u49w47AfX7hZ0n6/giphy.gif" },
        { id: 3, name: "Plank", type: "time", desc: "Corpo dritto come una tavola, contrai glutei e addome.", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6M2Z6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmRjPTEmZ3c9MTI4MA/3o7TKu6WJxtZvbqKv6/giphy.gif" },
        { id: 4, name: "Burpees", type: "reps", desc: "Dalla posizione eretta a terra e poi un salto esplosivo.", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6M2Z6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmRjPTEmZ3c9MTI4MA/26u4b4pX7pGqM6k7u/giphy.gif" }
    ];

    let currentWorkout = [
        { ...exerciseDB[0], goal: "15 Reps", done: false },
        { ...exerciseDB[2], goal: "45 Sec", done: false },
        { ...exerciseDB[1], goal: "20 Reps", done: false }
    ];

    let timerInterval;
    let timeLeft = 0;

    // Wake Lock
    if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').catch(console.error);
    }

    function initCalendar() {
        const cal = document.getElementById('calendar');
        for (let i = 1; i <= 30; i++) {
            const day = document.createElement('div');
            day.className = 'day' + (i === 14 ? ' has-workout' : '');
            day.innerText = i;
            cal.appendChild(day);
        }
    }

    function renderWorkout() {
        const area = document.getElementById('workout-area');
        area.innerHTML = '';
        let completedCount = 0;

        currentWorkout.forEach((ex, index) => {
            if (ex.done) completedCount++;
            const card = document.createElement('div');
            card.className = `exercise-card ${ex.done ? 'completed' : ''}`;
            card.innerHTML = `
                <div class="card-header">
                    <div>
                        <strong>${ex.name}</strong><br>
                        <small>${ex.goal}</small>
                    </div>
                    <div>
                        <button class="info-btn" onclick="toggleInfo(${index})">i</button>
                        <button onclick="completeStep(${index})">${ex.type === 'time' ? 'START' : 'DONE'}</button>
                    </div>
                </div>
                <div id="info-${index}" class="anim-box">
                    <img src="${ex.gif}" alt="${ex.name}">
                    <p style="padding:10px; font-size:0.8rem;">${ex.desc}</p>
                </div>
            `;
            area.appendChild(card);
        });

        document.getElementById('progress-bar').style.width = (completedCount / currentWorkout.length * 100) + '%';
    }

    function toggleInfo(index) {
        const box = document.getElementById(`info-${index}`);
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function completeStep(index) {
        const ex = currentWorkout[index];
        if (ex.type === 'time' && !ex.done) {
            startTimer(parseInt(ex.goal), ex.name, () => {
                ex.done = true;
                renderWorkout();
                startRestTimer();
            });
        } else {
            ex.done = true;
            renderWorkout();
            startRestTimer();
        }
    }

    function startTimer(seconds, label, callback) {
        const overlay = document.getElementById('timer-overlay');
        const display = document.getElementById('timer-display');
        const labelEl = document.getElementById('timer-label');
        
        overlay.style.display = 'flex';
        labelEl.innerText = label;
        timeLeft = seconds;
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            display.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                beep();
                vibrate();
                overlay.style.display = 'none';
                if (callback) callback();
            }
        }, 1000);
    }

    function startRestTimer() {
        startTimer(30, "RECUPERO", null);
    }

    function addTime() {
        timeLeft += 10;
        document.getElementById('timer-display').innerText = timeLeft;
    }

    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
    }

    function vibrate() {
        if (navigator.vibrate) navigator.vibrate(500);
    }

    window.onload = () => {
        initCalendar();
        renderWorkout();
    };
</script>
</body>
</html>
